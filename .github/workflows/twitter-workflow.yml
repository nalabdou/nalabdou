name: Latest Twitter Updates
on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-twitter:
    name: Update this repo's README with latest updates from Twitter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "TWITTER"
          feed_list: "https://rss.app/feeds/01RssBiAu8BiOn2P.xml"
